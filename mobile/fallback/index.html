<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Oasis Worship Team</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #010b17; color: #C8D8EB;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem; padding: 2rem; text-align: center;
      }
      h1 { font-size: 1.4rem; letter-spacing: 0.08em; text-transform: uppercase; margin: 0; }
      p { opacity: 0.6; margin: 0; font-size: 0.9rem; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #00bfff; animation: pulse 1.2s infinite ease-in-out; }
      @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <!-- Phase 1 fallback shell. Shown only when the remote app can't be reached.
         Phase 2 replaces this webDir with the bundled static export ("out"). -->
    <div class="wrap">
      <div class="dot"></div>
      <h1>Oasis Worship Team</h1>
      <p>Sin conexión. Revisa tu red e inténtalo de nuevo.</p>
    </div>
  </body>
</html>
